kind = "mobile"
previewPath = "/"
title = "Space Sling"
version = "1.0.0"
id = "artifacts/space-sling"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21133

[services.development]
run = "pnpm --filter @workspace/space-sling run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/space-sling", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/space-sling", "run", "serve" ]

[services.env]
PORT = "21133"
BASE_PATH = "/"
